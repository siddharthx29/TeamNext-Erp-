{% load static %}
<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - TeamNext</title>
    <link rel="stylesheet" href="/static/myapp/css/theme.css">
    <script src="/static/myapp/js/theme.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px) rotateX(5deg);
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 16px;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
        }

        .back-link:hover {
            color: white;
        }


        @media (max-width: 768px) {
            .card {
                width: 90%;
                padding: 30px;
            }
        }

        @media (max-width: 480px) {
            .card {
                width: 95%;
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <div style="text-align: center; margin-bottom: 20px;">
            <div
                style="display:inline-block; background:rgba(255,255,255,0.95); border-radius:14px; padding:10px; box-shadow:0 4px 15px rgba(0,0,0,0.1);">
                <img src="{% static 'myapp/images/teamnext_logo.png' %}" alt="TeamNext ERP"
                    style="width:140px; height:auto; display:block;">
            </div>
        </div>
        <h2 style="text-align: center; margin-bottom: 20px;">Forgot Password</h2>
        <p style="text-align: center; margin-bottom: 20px; opacity: 0.8;">Enter your email to receive OTP</p>

        <form method="POST" action="/forgot-password/">
            {% csrf_token %}
            <input name="email" type="email" placeholder="Enter your email" required>
            <button type="submit">Send OTP</button>
        </form>

        <a href="/" class="back-link">← Back to Login</a>
    </div>

</body>

</html>
