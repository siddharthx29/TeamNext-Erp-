<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - TeamNext</title>
    <link rel="stylesheet" href="/static/myapp/css/theme.css">
    <script src="/static/myapp/js/theme.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px) rotateX(5deg);
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 16px;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
        }

        .back-link:hover {
            color: white;
        }


        @media (max-width: 768px) {
            .card {
                width: 90%;
                padding: 30px;
            }
        }

        @media (max-width: 480px) {
            .card {
                width: 95%;
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <div style="text-align: center; margin-bottom: 20px;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="180" height="54"
                style="display: block; margin: 0 auto;">
                <defs>
                    <linearGradient id="logoGradient7" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:1" />
                    </linearGradient>
                    <linearGradient id="iconGradient7" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <g>
                    <circle cx="25" cy="30" r="8" fill="url(#iconGradient7)" opacity="0.9" />
                    <circle cx="10" cy="15" r="6" fill="url(#iconGradient7)" opacity="0.8" />
                    <circle cx="40" cy="15" r="6" fill="url(#iconGradient7)" opacity="0.8" />
                    <circle cx="10" cy="45" r="6" fill="url(#iconGradient7)" opacity="0.8" />
                    <circle cx="40" cy="45" r="6" fill="url(#iconGradient7)" opacity="0.8" />
                    <line x1="25" y1="30" x2="10" y2="15" stroke="url(#iconGradient7)" stroke-width="2" opacity="0.6" />
                    <line x1="25" y1="30" x2="40" y2="15" stroke="url(#iconGradient7)" stroke-width="2" opacity="0.6" />
                    <line x1="25" y1="30" x2="10" y2="45" stroke="url(#iconGradient7)" stroke-width="2" opacity="0.6" />
                    <line x1="25" y1="30" x2="40" y2="45" stroke="url(#iconGradient7)" stroke-width="2" opacity="0.6" />
                    <path d="M 45 30 L 50 25 L 50 30 L 50 35 Z" fill="url(#iconGradient7)" opacity="0.9" />
                </g>
                <text x="60" y="25" font-family="'Segoe UI', 'Arial', sans-serif" font-size="22" font-weight="bold"
                    fill="url(#logoGradient7)">TeamNext</text>
                <text x="60" y="45" font-family="'Segoe UI', 'Arial', sans-serif" font-size="8" font-weight="600"
                    fill="#4ecdc4" opacity="0.8">Enterprise Management Tool</text>
            </svg>
        </div>
        <h2 style="text-align: center; margin-bottom: 20px;">Forgot Password</h2>
        <p style="text-align: center; margin-bottom: 20px; opacity: 0.8;">Enter your email to receive OTP</p>

        <form method="POST" action="/forgot-password/">
            {% csrf_token %}
            <input name="email" type="email" placeholder="Enter your email" required>
            <button type="submit">Send OTP</button>
        </form>

        <a href="/" class="back-link">← Back to Login</a>
    </div>

</body>

</html>
