{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamNext Enterprise Management Tool • Company Registration</title>
    <link rel="stylesheet" href="/static/myapp/css/theme.css">
    <script src="/static/myapp/js/theme.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;

            background: linear-gradient(135deg, #0f172a, #1e293b);
            overflow-x: hidden;
            color: #fff;
        }


        body::before {
            content: '';
            position: fixed;
            width: 700px;
            height: 700px;
            background: #00f5ff;
            filter: blur(200px);
            opacity: .15;
            top: -250px;
            left: -250px;
        }


        .card {
            width: 100%;
            max-width: 820px;

            padding: 45px;

            border-radius: 22px;

            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, .06);

            border: 1px solid rgba(255, 255, 255, .1);

            box-shadow:
                0 20px 60px rgba(0, 0, 0, .5),
                0 0 50px rgba(0, 255, 255, .15);

            transition: .25s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }


        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 30px;
            letter-spacing: 1px;
        }

        .logo p {
            opacity: .7;
            font-size: 14px;
            margin-top: 6px;
        }


        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 500;
        }


        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .full {
            grid-column: 1/-1;
        }


        /* Global 3D styles applied via theme.css */



        .button-container {
            grid-column: 1/-1;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;

            font-size: 16px;
            font-weight: 600;

            background: linear-gradient(45deg, #00f5ff, #7b2cff);
            color: white;

            position: relative;
            overflow: hidden;

            transition: .3s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px #00f5ff;
        }


        .loader {
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, .3);
            border-top: 3px solid white;
            border-radius: 50%;
            display: inline-block;
            animation: spin .7s linear infinite;
            margin-left: 10px;
        }

        .hidden {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }


        .terms {
            font-size: 12px;
            opacity: .6;
            text-align: center;
            margin: 15px 0;
        }

        .links {
            text-align: center;
            margin-top: 15px;
        }

        .links a {
            color: #00f5ff;
            text-decoration: none;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .card {
                padding: 30px 20px;
                border-radius: 16px;
            }

            .form-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .logo h1 {
                font-size: 24px;
            }

            button {
                padding: 14px;
                font-size: 15px;
            }
        }


        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #020617;
        }

        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, transparent 0%, rgba(2, 6, 23, 0.4) 100%);
            pointer-events: none;
        }
    </style>
    <link rel="stylesheet" href="/static/myapp/css/responsive.css">
</head>

<body>
    <canvas id="bg-canvas"></canvas>
    <div class="background-overlay"></div>

    <div class="card">

        <div class="logo">
            <div style="text-align: center; margin-bottom: 15px;">
                <img src="{% static 'myapp/images/logo.svg' %}" alt="TeamNext ERP"
                    style="width: 180px; height: auto; display: block; margin: 0 auto; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));">
            </div>
            <p>Enterprise Software Error Management Platform</p>
        </div>

        <h2>Register Your Company</h2>

        <form method="POST" action="/signup/">
            {% csrf_token %}

            <div class="form-grid">

                <input class="full" name="company_name" placeholder="Company Name" required>

                <input name="industry" placeholder="Industry" required>
                <input name="company_size" placeholder="Company Size" required>

                <input name="contact_person" placeholder="Contact Person" required>
                <input name="contact_title" placeholder="Contact Title" required>

                <input class="full" name="email" type="email" placeholder="Business Email Address" required>
                <input class="full" name="phone" placeholder="Business Phone Number" required>

                <input class="full" name="website" placeholder="Company Website (optional)">

                <input class="full" name="address" placeholder="Business Address" required>

                <input name="password" type="password" placeholder="Create Password" required>
                <input name="confirm_password" type="password" placeholder="Confirm Password" required>

            </div>

            <div class="terms">
                By registering you agree to our Terms & Privacy Policy
            </div>

            <div class="button-container">
                <button id="submitBtn" type="submit">
                    <span id="btnText">Register Company</span>
                    <span id="loader" class="loader hidden"></span>
                </button>
            </div>

        </form>

        <div class="links">
            <a href="/">Already have an account? Sign In</a>
        </div>

    </div>


    <script>

        const form = document.querySelector("form");
        const btnText = document.getElementById("btnText");
        const loader = document.getElementById("loader");

        form.addEventListener("submit", () => {
            btnText.innerText = "Registering...";
            loader.classList.remove("hidden");
        });


        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            const particleCount = Math.floor((canvas.width * canvas.height) / 10000);
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 0.8;
                this.speedY = (Math.random() - 0.5) * 0.8;
                this.color = `hsla(${210 + Math.random() * 40}, 70%, 60%, ${Math.random() * 0.4 + 0.2})`;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.update();
                p.draw();
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = p.x - particles[j].x;
                    const dy = p.y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        ctx.strokeStyle = `rgba(125, 211, 252, ${0.15 * (1 - dist / 120)})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        animate();
    </script>

    <script src="/static/myapp/js/responsive.js"></script>
</body>

</html>
