{% load static %}
<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification - TeamNext</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            overflow: hidden;
            color: white;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(255, 119, 198, 0.3) 0%, transparent 50%);
            animation: pulse 4s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 50px;
            width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform-style: preserve-3d;
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
        }

        .card:hover {
            transform: translateY(-10px) rotateX(5deg);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            text-align: center;
            margin-bottom: 30px;
            opacity: 0.8;
            font-size: 14px;
        }

        .otp-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .otp {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .otp:focus {
            outline: none;
            border-color: #4ecdc4;
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.5);
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
        }


        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,0V46.29c47.79,22.2,103.59,32.17,158,28,70.36-5.37,136.33-33.31,206.8-37.5C438.64,32.43,512.34,53.67,583,72.05c69.27,18,138.3,24.88,209.4,13.08,36.15-6,69.85-17.84,104.45-29.34C989.49,25,1113-14.29,1200,52.47V0Z" opacity=".25" fill="%23FFFFFF"></path><path d="M0,0V15.81C13,36.92,27.64,56.86,47.69,72.05,99.41,111.27,165,111,224.58,91.58c31.15-10.15,60.09-26.07,89.67-39.8,40.92-19,84.73-46,130.83-49.67,36.26-2.85,70.9,9.42,98.6,31.56,31.77,25.39,62.32,62,103.63,73,40.44,10.79,81.35-6.69,119.13-24.28s75.16-39,116.92-43.05c59.73-5.85,113.28,22.88,168.9,38.84,30.2,8.66,59,6.17,87.09-7.5,22.43-10.89,48-26.93,60.65-49.24V0Z" opacity=".5" fill="%23FFFFFF"></path><path d="M0,0V5.63C149.93,59,314.09,71.32,475.83,42.57c43-7.64,84.23-20.12,127.61-26.46,59-8.63,112.48,12.24,165.56,35.4C827.93,77.22,886,95.24,951.2,90c86.53-7,172.46-45.71,248.8-84.81V0Z" fill="%23FFFFFF"></path></svg>');
            background-size: cover;
            animation: wave-move 10s ease-in-out infinite;
        }

        @keyframes wave-move {

            0%,
            100% {
                transform: translateX(0);
            }

            50% {
                transform: translateX(-25px);
            }
        }


        @media (max-width: 768px) {
            .card {
                width: 90%;
                padding: 40px;
            }

            .otp-container {
                justify-content: space-around;
            }

            .otp {
                width: 45px;
                height: 55px;
                font-size: 20px;
            }
        }

        @media (max-width: 480px) {
            .card {
                width: 95%;
                padding: 30px;
            }

            .otp {
                width: 40px;
                height: 50px;
                font-size: 18px;
            }

            h2 {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="wave"></div>

    <div class="card">
        <div style="text-align: center; margin-bottom: 16px;">
            <div
                style="display:inline-block; background:rgba(255,255,255,0.95); border-radius:14px; padding:10px; box-shadow:0 4px 15px rgba(0,0,0,0.1);">
                <img src="{% static 'myapp/images/teamnext_logo.png' %}" alt="TeamNext ERP"
                    style="width:140px; height:auto; display:block;">
            </div>
        </div>
        <h2>Verify OTP</h2>
        <p>Enter the 4-digit code sent to your email</p>

        <div class="otp-container">
            <input class="otp" maxlength="1" id="otp1">
            <input class="otp" maxlength="1" id="otp2">
            <input class="otp" maxlength="1" id="otp3">
            <input class="otp" maxlength="1" id="otp4">
        </div>

        <form method="POST" action="/otp/" id="otpForm">
            {% csrf_token %}
            <input name="otp" id="otpHidden" style="display:none;">
            <button type="submit">Verify</button>
        </form>
    </div>

    <script>

        const otpInputs = document.querySelectorAll('.otp');
        const otpHidden = document.getElementById('otpHidden');
        const otpForm = document.getElementById('otpForm');

        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
                updateHiddenOTP();
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && index > 0 && e.target.value === '') {
                    otpInputs[index - 1].focus();
                }
            });
        });

        function updateHiddenOTP() {
            let otp = '';
            otpInputs.forEach(input => otp += input.value);
            otpHidden.value = otp;
        }

        otpForm.addEventListener('submit', (e) => {
            updateHiddenOTP();
        });</script>

</body>

</html>
