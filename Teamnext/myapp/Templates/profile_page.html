<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - TeamNext</title>
    <link rel="stylesheet" href="/static/myapp/css/theme.css">
    <script src="/static/myapp/js/theme.js"></script>
    <style>
        body {
            font-family: Inter, Arial, sans-serif;
            background: #020617;
            color: #e6eef8;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .info-group {
            margin-bottom: 20px;
        }

        .label {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .value {
            font-size: 18px;
            font-weight: 500;
            color: #f1f5f9;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(99, 102, 241, 0.1);
            color: #818cf8;
            margin-top: 4px;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="avatar">{{ email|slice:":1"|upper }}</div>
            <div>
                <h1 style="margin:0; font-size:24px;">{{ user.name }}</h1>
                <div class="badge">{{ user.role }}</div>
            </div>
        </div>

        <div class="info-group">
            <div class="label">Email Address</div>
            <div class="value">{{ email }}</div>
        </div>

        <div class="info-group">
            <div class="label">Organization</div>
            <div class="value">{{ user.company_name }}</div>
        </div>

        <div style="margin-top:40px; border-top:1px solid rgba(255,255,255,0.05); padding-top:20px;">
            <a href="/dashboard/" class="back-btn">← Back to Dashboard</a>
        </div>
    </div>
</body>

</html>
