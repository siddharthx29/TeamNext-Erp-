<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#667eea;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon: Connected nodes representing teamwork -->
  <g id="icon">
    <!-- Central node -->
    <circle cx="25" cy="30" r="8" fill="url(#iconGradient)" opacity="0.9"/>
    <!-- Connected nodes -->
    <circle cx="10" cy="15" r="6" fill="url(#iconGradient)" opacity="0.8"/>
    <circle cx="40" cy="15" r="6" fill="url(#iconGradient)" opacity="0.8"/>
    <circle cx="10" cy="45" r="6" fill="url(#iconGradient)" opacity="0.8"/>
    <circle cx="40" cy="45" r="6" fill="url(#iconGradient)" opacity="0.8"/>
    <!-- Connection lines -->
    <line x1="25" y1="30" x2="10" y2="15" stroke="url(#iconGradient)" stroke-width="2" opacity="0.6"/>
    <line x1="25" y1="30" x2="40" y2="15" stroke="url(#iconGradient)" stroke-width="2" opacity="0.6"/>
    <line x1="25" y1="30" x2="10" y2="45" stroke="url(#iconGradient)" stroke-width="2" opacity="0.6"/>
    <line x1="25" y1="30" x2="40" y2="45" stroke="url(#iconGradient)" stroke-width="2" opacity="0.6"/>
    <!-- Arrow pointing forward (next) -->
    <path d="M 45 30 L 50 25 L 50 30 L 50 35 Z" fill="url(#iconGradient)" opacity="0.9"/>
  </g>
  
  <!-- Text: TeamNext -->
  <text x="60" y="25" font-family="'Segoe UI', 'Arial', sans-serif" font-size="22" font-weight="bold" fill="url(#logoGradient)">TeamNext</text>
  
  <!-- Text: ERP -->
  <text x="60" y="45" font-family="'Segoe UI', 'Arial', sans-serif" font-size="14" font-weight="600" fill="#667eea" opacity="0.8">ERP</text>
</svg>

