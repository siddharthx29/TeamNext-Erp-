databases:
  - name: teamnext-db
    databaseName: teamnext
    user: teamnext
    plan: free

services:
  - type: web
    name: teamnext-app
    env: python
    plan: free
    rootDir: Teamnext
    buildCommand: "bash ./build.sh"
    startCommand: "gunicorn project.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: teamnext-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: EMAIL_HOST
        value: smtp-relay.brevo.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        value: a472fb001@smtp-brevo.com
      - key: EMAIL_HOST_PASSWORD
        value: Py2NaZjgJp6qGchE
      - key: DEFAULT_FROM_EMAIL
        value: otp@teamnexterp.com
      - key: DEBUG
        value: "False"
