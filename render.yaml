databases:
  - name: teamnext-db
    databaseName: teamnext
    user: teamnext

services:
  - type: web
    name: teamnext-app
    env: python
    rootDir: Teamnext
    buildCommand: "bash ./build.sh"
    startCommand: "gunicorn project.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: teamnext-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: PYTHON_VERSION
        value: 3.11.0
